<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nassau Barbearia | Exclusividade e Alto Padrão</title>

<link rel="icon" type="image/jpeg" href="Nassau.jpg">
<link rel="stylesheet" href="nassau.css">

<script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>

<h1 style="text-align:center;margin-top:50px;">Nassau Barbearia</h1>

<script>

document.addEventListener("DOMContentLoaded", function () {

    const toggle = document.querySelector(".mobile-toggle");
    const menu = document.querySelector(".mobile-menu");
    const close = document.querySelector(".close-menu");

    if (toggle) {
        toggle.addEventListener("click", () => {
            menu.classList.add("active");
        });
    }

    if (close) {
        close.addEventListener("click", () => {
            menu.classList.remove("active");
        });
    }

    const reveals = document.querySelectorAll(".reveal-up, .reveal-left, .reveal-right");

    const revealOnScroll = () => {
        const trigger = window.innerHeight * 0.85;

        reveals.forEach(el => {
            const top = el.getBoundingClientRect().top;
            if (top < trigger) {
                el.classList.add("active");
            }
        });
    };

    window.addEventListener("scroll", revealOnScroll);
    revealOnScroll();

    const banner = document.getElementById("cookie-banner");
    const accept = document.getElementById("accept-cookies");
    const reject = document.getElementById("reject-cookies");

    if (banner && !localStorage.getItem("cookies")) {
        banner.style.display = "flex";
    }

    accept?.addEventListener("click", () => {
        localStorage.setItem("cookies", "all");
        banner.style.display = "none";
    });

    reject?.addEventListener("click", () => {
        localStorage.setItem("cookies", "essential");
        banner.style.display = "none";
    });

    const navbar = document.getElementById("navbar");

    window.addEventListener("scroll", () => {
        if (window.scrollY > 50) {
            navbar?.classList.add("scrolled");
        } else {
            navbar?.classList.remove("scrolled");
        }
    });

});




</script>

</body>
</html>
